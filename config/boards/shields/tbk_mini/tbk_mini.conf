# TBK Mini default configuration
# Uncomment and adjust as needed.

# Enable deep sleep for better battery life (wireless builds)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Enable USB logging for debugging (disable in production)
CONFIG_ZMK_USB_LOGGING=y

# BLE settings
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
